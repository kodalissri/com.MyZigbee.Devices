<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 28px 24px;
      color: #333;
      margin: 0;
    }
    h3 {
      margin: 0 0 8px 0;
      font-size: 18px;
      font-weight: 600;
    }
    p {
      margin: 0 0 16px 0;
      font-size: 14px;
      color: #666;
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 4px;
    }
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #009dea;
    }
    .hint {
      font-size: 12px;
      color: #999;
      margin-top: -10px;
      margin-bottom: 14px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #009dea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: #007fc0; }
    button:disabled { background: #b0d8f0; cursor: not-allowed; }
    .error {
      color: #e74c3c;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <h3>Connect ESPHome HRV</h3>
  <p>Enter the connection details for your ESPHome device.</p>

  <label for="ip">IP Address</label>
  <input type="text" id="ip" placeholder="192.168.1.100" autocomplete="off" />

  <label for="port">Port</label>
  <input type="number" id="port" value="6053" min="1" max="65535" />

  <label for="key">Encryption Key (base64)</label>
  <input type="text" id="key" placeholder="Leave blank if not using encryption" autocomplete="off" />
  <p class="hint">Found in your ESPHome device YAML under <code>api: encryption: key:</code></p>

  <div class="error" id="error"></div>
  <button id="btn" onclick="connect()">Connect</button>

  <script>
    document.getElementById('ip').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') connect();
    });

    function connect() {
      var ip   = document.getElementById('ip').value.trim();
      var port = parseInt(document.getElementById('port').value, 10) || 6053;
      var key  = document.getElementById('key').value.trim();
      var btn  = document.getElementById('btn');
      var err  = document.getElementById('error');

      err.style.display = 'none';

      if (!ip) {
        err.textContent = 'Please enter an IP address.';
        err.style.display = 'block';
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Connecting…';

      Homey.emit('validate', { ip: ip, port: port, encryptionKey: key }, function(error) {
        if (error) {
          err.textContent   = error.message || 'Connection failed. Check the details and try again.';
          err.style.display = 'block';
          btn.disabled      = false;
          btn.textContent   = 'Connect';
          return;
        }
        Homey.nextView();
      });
    }
  </script>
</body>
</html>
